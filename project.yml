name: beeWatch
options:
  bundleIdPrefix: com.beewatch
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

schemes:
  beeWatch:
    build:
      targets:
        beeWatch: all
    run:
      config: Debug
    archive:
      config: Release

  beeWatch Watch App:
    build:
      targets:
        beeWatch Watch App: all
    run:
      config: Debug
    archive:
      config: Release

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: VDG762YNX9
    CODE_SIGN_STYLE: Automatic

targets:
  beeWatch:
    type: application
    platform: iOS
    sources:
      - path: beeWatch
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beewatch.ios
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: beeWatch/beeWatch.entitlements
    dependencies:
      - target: beeWatch Watch App
        embed: true
        codeSign: true

  beeWatch Watch App:
    type: application
    platform: watchOS
    sources:
      - path: beeWatch Watch App
        excludes:
          - "Complications/**"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beewatch.ios.watchkitapp
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: beeWatch Watch App/Info.plist
      properties:
        CFBundleDisplayName: beeWatch
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.beewatch.ios
        CFBundleURLTypes:
          - CFBundleURLName: com.beewatch
            CFBundleURLSchemes:
              - beewatch
    entitlements:
      path: beeWatch Watch App/beeWatch Watch App.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.beewatch
    dependencies:
      - target: beeWatch Watch App Complications
        embed: true
        codeSign: true

  beeWatch Watch App Complications:
    type: app-extension
    platform: watchOS
    sources:
      - path: beeWatch Watch App/Complications
      - path: Shared
    info:
      path: beeWatch Watch App/Complications/Info.plist
      properties:
        CFBundleDisplayName: BeeWatch
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beewatch.ios.watchkitapp.complications
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: AccentColor
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    entitlements:
      path: beeWatch Watch App/Complications/Complications.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.beewatch
