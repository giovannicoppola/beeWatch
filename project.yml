name: beeWatch
options:
  bundleIdPrefix: com.beewatch
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: VDG762YNX9
    CODE_SIGN_STYLE: Automatic

targets:
  beeWatch:
    type: application
    platform: iOS
    sources:
      - path: beeWatch
        excludes:
          - "**/*.xcassets/**"
      - path: Shared
    resources:
      - path: beeWatch/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beewatch.ios
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: beeWatch Watch App
        embed: true
        codeSign: true

  beeWatch Watch App:
    type: application
    platform: watchOS
    sources:
      - path: beeWatch Watch App
        excludes:
          - "**/*.xcassets/**"
          - "Complications/**"
      - path: Shared
    resources:
      - path: beeWatch Watch App/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beewatch.ios.watchkitapp
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.beewatch.ios
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: beeWatch Watch App Complications

  beeWatch Watch App Complications:
    type: app-extension
    platform: watchOS
    sources:
      - path: beeWatch Watch App/Complications
      - path: Shared
    info:
      path: beeWatch Watch App/Complications/Info.plist
      properties:
        CFBundleDisplayName: BeeWatch Complications
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beewatch.ios.watchkitapp.complications
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: AccentColor
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    entitlements:
      path: beeWatch Watch App/Complications/Complications.entitlements
      properties: {}
